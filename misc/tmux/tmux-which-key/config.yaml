# yaml-language-server: $schema=config.schema.yaml
#
# Which-key menu config for tmux.
# Keys here mirror the actual prefix bindings so the menu
# reinforces muscle memory.  Prefix is C-q.
#
command_alias_start_index: 200
keybindings:
  # root_table: C-Space
  prefix_table: Space
title:
  style: align=centre,bold
  prefix: tmux
  prefix_style: fg=green,align=centre,bold
position:
  x: R
  y: P
custom_variables:
  - name: log_info
    value: "#[fg=green,italics] [info]#[default]#[italics]"
macros:
  - name: reload-config
    commands:
      - display "#{log_info} Loading config... "
      - source-file $HOME/.config/tmux/tmux.conf
      - display -p "\n\n... Press ENTER to continue"
  - name: restart-pane
    commands:
      - display "#{log_info} Restarting pane"
      - "respawnp -k -c #{pane_current_path}"
  - name: fzf-session
    commands:
      - "run-shell -b \"tmux display-popup -E \\\"tmux list-sessions | fzf --reverse | cut -d: -f1 | xargs tmux switch-client -t\\\"\""
  - name: fzf-window
    commands:
      - "run-shell -b \"tmux display-popup -E \\\"tmux list-windows | fzf --reverse | cut -d: -f1 | xargs tmux select-window -t\\\"\""
items:
  # -- Quick actions -----------------------------------------------------------
  # These mirror direct prefix bindings (C-q <key>)
  - name: "Run cmd  :"
    key: ":"
    command: command-prompt
  - name: "Last win  Tab"
    key: tab
    command: last-window
  - name: "Last pane  ;"
    key: ";"
    command: last-pane
  - name: "Copy mode  v"
    key: v
    command: copy-mode
  - name: "Detach  C-d"
    key: d
    command: detach
  - separator: true

  # -- Workmux -----------------------------------------------------------------
  - name: +Workmux
    key: W
    menu:
      - name: "Dashboard  C-s"
        key: s
        command: 'display-popup -h 30 -w 100 -E "workmux dashboard"'
      - name: "Add worktree  C-a"
        key: a
        command: "display-popup -E -d \"#{pane_current_path}\" -h 30 -w 100 $HOME/.nix-profile/share/tmux-plugins/tw-tmux-lib/scripts/workmux_add_prompt.sh"

  # -- Navigate -----------------------------------------------------------------
  - name: +Navigate
    key: n
    menu:
      - name: "Session (fzf)  C-j"
        key: j
        macro: fzf-session
      - name: "Window (fzf)  C-h"
        key: h
        macro: fzf-window
      - separator: true
      - name: "Goto session  g"
        key: g
        command: command-prompt -p session "switch-client -t %%"
      - name: "Find window  f"
        key: f
        command: command-prompt "find-window -Z %%"

  # -- Windows -----------------------------------------------------------------
  - name: +Windows
    key: w
    menu:
      - name: "Last  Tab"
        key: tab
        command: last-window
      - name: "Choose  w"
        key: w
        command: choose-tree -Zw
      - name: "Previous  C-p/["
        key: p
        command: previous-window
      - name: "Next  C-n/]"
        key: n
        command: next-window
      - name: "New  c"
        key: c
        command: "neww -c #{pane_current_path}"
      - separator: true
      - name: "Split horiz  -"
        key: "-"
        command: "splitw -v -c #{pane_current_path} -l 20"
      - name: "Split vert  _/|"
        key: "|"
        command: "splitw -h -c #{pane_current_path}"
      - separator: true
      - name: +Layout
        key: l
        menu:
          - name: Next
            key: l
            command: nextl
            transient: true
          - name: Tiled
            key: t
            command: selectnl tiled
          - name: Horizontal
            key: h
            command: selectl even-horizontal
          - name: Vertical
            key: v
            command: selectl even-vertical
          - name: Horizontal main
            key: H
            command: selectl main-horizontal
          - name: Vertical main
            key: V
            command: selectl main-vertical
      - name: Rotate
        key: o
        command: rotatew
        transient: true
      - name: Rotate reverse
        key: O
        command: rotatew -D
        transient: true
      - separator: true
      - name: "Rename  ,"
        key: R
        command: command-prompt -I "#W" "renamew -- \"%%\""
      - name: "Kill  &"
        key: X
        command: 'confirm -p "Kill window #W? (y/n)" killw'

  # -- Panes -------------------------------------------------------------------
  - name: +Panes
    key: p
    menu:
      - name: "Last  ;(pane)"
        key: tab
        command: lastp
      - name: "Choose  q"
        key: q
        command: displayp -d 0
      - separator: true
      - name: "Left  h"
        key: h
        command: selectp -L
      - name: "Down  j"
        key: j
        command: selectp -D
      - name: "Up  k"
        key: k
        command: selectp -U
      - name: "Right  l"
        key: l
        command: selectp -R
      - separator: true
      - name: "Zoom  z"
        key: z
        command: resizep -Z
      - name: +Resize
        key: r
        menu:
          - name: "Left  H"
            key: h
            command: resizep -L 2
            transient: true
          - name: "Down  J"
            key: j
            command: resizep -D 2
            transient: true
          - name: "Up  K"
            key: k
            command: resizep -U 2
            transient: true
          - name: "Right  L"
            key: l
            command: resizep -R 2
            transient: true
          - name: Left +10
            key: H
            command: resizep -L 10
            transient: true
          - name: Down +10
            key: J
            command: resizep -D 10
            transient: true
          - name: Up +10
            key: K
            command: resizep -U 10
            transient: true
          - name: Right +10
            key: L
            command: resizep -R 10
            transient: true
      - separator: true
      - name: "Swap prev  <"
        key: "<"
        command: swapp -U
      - name: "Swap next  >"
        key: ">"
        command: swapp -D
      - name: "Join  @"
        key: "@"
        command: "choose-window \"join-pane -h -s %%\""
      - name: "Break  !"
        key: "!"
        command: break-pane
      - separator: true
      - name: "Mark  m"
        key: m
        command: selectp -m
      - name: "Unmark  M"
        key: M
        command: selectp -M
      - name: Capture
        key: C
        command: capture-pane
      - name: Respawn
        key: R
        macro: restart-pane
      - name: "Kill  x"
        key: x
        command: killp

  # -- Buffers -----------------------------------------------------------------
  - name: +Buffers
    key: b
    menu:
      - name: "List  b"
        key: b
        command: list-buffers
      - name: "Choose  ="
        key: "="
        command: choose-buffer -Z
      - name: "Paste  p"
        key: p
        command: pasteb
      - name: "Pick paste  P"
        key: P
        command: choose-buffer

  # -- Sessions ----------------------------------------------------------------
  - name: +Sessions
    key: s
    menu:
      - name: "Choose  s"
        key: s
        command: choose-tree -Zs
      - name: "New  C (sessionist)"
        key: C
        command: command-prompt -p "New session:" "new-session -s '%%'"
      - name: "Rename  $"
        key: r
        command: command-prompt -I "#S" "rename-session -- \"%%\""
      - name: "Kill  X (sessionist)"
        key: X
        command: 'confirm -p "Kill session #S? (y/n)" kill-session'
      - separator: true
      - name: "Previous  ("
        key: p
        command: switch-client -p
      - name: "Next  )"
        key: n
        command: switch-client -n
      - name: "Last  S (sessionist)"
        key: l
        command: switchc -l
      - name: "Detach  C-d/d"
        key: d
        command: detach

  # -- Client ------------------------------------------------------------------
  - name: +Client
    key: C
    menu:
      - name: "Choose  D"
        key: c
        command: choose-client -Z
      - name: Last
        key: l
        command: switchc -l
      - name: Previous
        key: p
        command: switchc -p
      - name: Next
        key: n
        command: switchc -n
      - separator: true
      - name: "Refresh  R"
        key: R
        command: refresh
      - name: Suspend
        key: Z
        command: suspendc
      - separator: true
      - name: "Reload config  r"
        key: r
        macro: reload-config
      - name: Customize
        key: ","
        command: customize-mode -Z

  # -- Misc --------------------------------------------------------------------
  - separator: true
  - name: "Messages  i"
    key: i
    command: display-message
  - name: "Show messages  ~"
    key: "~"
    command: show-messages
  - name: "Keys  ?"
    key: "?"
    command: list-keys -N
