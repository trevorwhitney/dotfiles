nerdfont: true
agent: opencode
worktree_dir: ../
worktree_naming: full
prompt_file_only: true
auto_name:
  # workmux execs this command directly (no shell) with the naming prompt on
  # stdin, so pipes/substitutions must live inside the script, not here. See
  # branch-name.sh for details.
  command: '/Users/twhitney/.config/workmux/branch-name.sh'
  background: true
panes:
  - command: nvim
    focus: true
post_create:
  - '[ ! -f .envrc ] && [ -f "$WM_PROJECT_ROOT/.envrc" ] && ln -s "$WM_PROJECT_ROOT/.envrc" .envrc || true'
  - direnv allow || true
  - >-
    if [ -f package.json ]; then
      if [ -f pnpm-lock.yaml ]; then pnpm install;
      elif [ -f yarn.lock ]; then yarn install;
      elif [ -f bun.lockb ] || [ -f bun.lock ]; then bun install;
      else npm install;
      fi
    fi || true
  - >-
    if [ -f go.mod ]; then
      if [ -f vendor/modules.txt ]; then go mod vendor;
      else go mod download;
      fi
    fi || true
theme: glacier-signal
