nerdfont: true
agent: opencode
worktree_dir: ../
worktree_naming: full
prompt_file_only: true
auto_name:
  # --system-prompt (not --append) replaces claude-code's agentic prompt so it
  # summarizes instead of trying to *do* the task; --tools "" prevents it from
  # entering "let me find and fix this" mode. The awk pipeline is a hard failsafe
  # that clamps to <=5 kebab words even if the model ever emits a sentence.
  command: 'claude --model haiku --tools "" --system-prompt "You are a text-to-branch-name converter. Output ONLY a kebab-case git branch name of at most 4 words summarizing the input. Lowercase, hyphen-separated, no other punctuation, no explanation, no sentences." -p "$(cat)" | tr "[:upper:]" "[:lower:]" | tr -cs "a-z0-9" "-" | sed -E "s/-+/-/g; s/^-|-$//g" | awk -F- "{n=(NF>5?5:NF); s=\$1; for(i=2;i<=n;i++) s=s\"-\"\$i; print s}"'
  system_prompt: "Generate a concise kebab-case git branch name (2-4 words) summarizing the task. Lowercase, hyphen-separated, no prefixes."
  background: true
panes:
  - command: nvim
    focus: true
post_create:
  - '[ ! -f .envrc ] && [ -f "$WM_PROJECT_ROOT/.envrc" ] && ln -s "$WM_PROJECT_ROOT/.envrc" .envrc || true'
  - direnv allow || true
  - >-
    if [ -f package.json ]; then
      if [ -f pnpm-lock.yaml ]; then pnpm install;
      elif [ -f yarn.lock ]; then yarn install;
      elif [ -f bun.lockb ] || [ -f bun.lock ]; then bun install;
      else npm install;
      fi
    fi || true
  - >-
    if [ -f go.mod ]; then
      if [ -f vendor/modules.txt ]; then go mod vendor;
      else go mod download;
      fi
    fi || true
theme: glacier-signal
