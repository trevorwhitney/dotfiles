nerdfont: true
agent: opencode
worktree_dir: ../
worktree_naming: full
prompt_file_only: true
panes:
  - command: nvim
    focus: true
post_create:
  - '[ ! -f .envrc ] && [ -f "$WM_PROJECT_ROOT/.envrc" ] && ln -s "$WM_PROJECT_ROOT/.envrc" .envrc || true'
  - direnv allow || true
  - >-
    REPO_GROUP=$(basename $(readlink -f $(git rev-parse --git-common-dir)/../..));
    if ! bd status >/dev/null 2>&1; then
      echo "Initializing Beads for $REPO_GROUP...";
      bd init --stealth --prefix "$REPO_GROUP";
    else
      echo "Beads already active for $REPO_GROUP.";
    fi
  - >-
    if [ -f package.json ]; then
      if [ -f pnpm-lock.yaml ]; then pnpm install;
      elif [ -f yarn.lock ]; then yarn install;
      elif [ -f bun.lockb ] || [ -f bun.lock ]; then bun install;
      else npm install;
      fi
    fi || true
  - >-
    if [ -f go.mod ]; then
      if [ -f vendor/modules.txt ]; then go mod vendor;
      else go mod download;
      fi
    fi || true
theme: glacier-signal
